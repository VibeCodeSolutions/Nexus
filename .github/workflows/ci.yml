name: CI

# Quick sanity check on every push to main and on pull requests.
# Catches build regressions before tagging a release.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check-core:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: core
      - name: cargo check
        working-directory: core
        run: cargo check --release

  check-desktop:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install System Deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri
      - name: Stub sidecar binary
        run: |
          mkdir -p desktop/src-tauri/binaries
          touch desktop/src-tauri/binaries/nexus-core-x86_64-unknown-linux-gnu
          chmod +x desktop/src-tauri/binaries/nexus-core-x86_64-unknown-linux-gnu
      - name: cargo check
        working-directory: desktop/src-tauri
        run: cargo check

  check-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Android Debug Build
        working-directory: android
        run: ./gradlew assembleDebug
