<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEXUS Dashboard</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0f0f1a;
  --bg-card: #1a1a2e;
  --bg-input: #16162b;
  --accent: #7c5cbf;
  --accent-hover: #9b7fd4;
  --text: #e0e0e0;
  --text-dim: #888;
  --border: #2a2a40;
  --success: #4caf50;
  --warning: #ff9800;
  --danger: #ef5350;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

/* Header */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 24px;
  background: var(--bg-card);
  border-bottom: 1px solid var(--border);
}
.header h1 { font-size: 20px; font-weight: 600; }
.header h1 span { color: var(--accent); }
.header-actions { display: flex; gap: 12px; align-items: center; }
.status-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--danger); display: inline-block; }
.status-dot.connected { background: var(--success); }

/* Tabs */
.tabs {
  display: flex;
  gap: 0;
  background: var(--bg-card);
  border-bottom: 1px solid var(--border);
  padding: 0 24px;
}
.tab {
  padding: 12px 24px;
  cursor: pointer;
  border: none;
  background: none;
  color: var(--text-dim);
  font-size: 14px;
  font-weight: 500;
  border-bottom: 2px solid transparent;
  transition: all 0.2s;
}
.tab:hover { color: var(--text); }
.tab.active { color: var(--accent); border-bottom-color: var(--accent); }

/* Content */
.content { padding: 24px; max-width: 1200px; margin: 0 auto; }

/* Buttons */
.btn {
  padding: 8px 16px;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  font-size: 13px;
  font-weight: 500;
  transition: all 0.2s;
}
.btn-primary { background: var(--accent); color: #fff; }
.btn-primary:hover { background: var(--accent-hover); }
.btn-sm { padding: 4px 10px; font-size: 12px; }
.btn-ghost { background: transparent; color: var(--text-dim); border: 1px solid var(--border); }
.btn-ghost:hover { color: var(--text); border-color: var(--text-dim); }
.btn-danger { background: var(--danger); color: #fff; }

/* Table */
table { width: 100%; border-collapse: collapse; }
th, td { padding: 10px 14px; text-align: left; border-bottom: 1px solid var(--border); }
th { color: var(--text-dim); font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600; }
td { font-size: 14px; }

/* Cards */
.card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 16px; }
.card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 20px;
}
.card h3 { font-size: 16px; margin-bottom: 8px; }
.card p { font-size: 13px; color: var(--text-dim); margin-bottom: 12px; }

/* Progress bar */
.progress-bar { background: var(--bg); border-radius: 4px; height: 8px; overflow: hidden; }
.progress-fill { height: 100%; background: var(--accent); border-radius: 4px; transition: width 0.4s; }

/* Input */
input, select, textarea {
  background: var(--bg-input);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 8px 12px;
  border-radius: 6px;
  font-size: 14px;
  outline: none;
  width: 100%;
}
input:focus, select:focus, textarea:focus { border-color: var(--accent); }

/* Toolbar */
.toolbar { display: flex; gap: 12px; margin-bottom: 16px; align-items: center; flex-wrap: wrap; }
.toolbar input, .toolbar select { width: auto; min-width: 200px; }

/* Modal */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.6); display: flex;
  align-items: center; justify-content: center; z-index: 100;
}
.modal {
  background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px;
  padding: 24px; width: 440px; max-width: 90vw;
}
.modal h2 { margin-bottom: 16px; font-size: 18px; }
.modal label { display: block; font-size: 13px; color: var(--text-dim); margin: 12px 0 4px; }
.modal .actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }

/* Task list */
.task-item {
  display: flex; align-items: center; gap: 12px; padding: 12px 16px;
  background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px;
  margin-bottom: 8px;
}
.task-item .checkbox {
  width: 20px; height: 20px; border: 2px solid var(--border); border-radius: 4px;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; transition: all 0.2s;
}
.task-item .checkbox.done { background: var(--accent); border-color: var(--accent); }
.task-item .checkbox.done::after { content: '\2713'; color: #fff; font-size: 13px; }
.task-item .task-title { flex: 1; font-size: 14px; }
.task-item .task-title.done { text-decoration: line-through; color: var(--text-dim); }
.task-item .task-meta { font-size: 12px; color: var(--text-dim); }

.badge {
  display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px;
  font-weight: 600; text-transform: uppercase;
}
.badge-category { background: rgba(124,92,191,0.2); color: var(--accent); }

.empty-state { text-align: center; padding: 60px 20px; color: var(--text-dim); }
.empty-state p { font-size: 14px; }

.hidden { display: none !important; }
</style>
</head>
<body>

<div class="header">
  <h1><span>NEXUS</span> Dashboard</h1>
  <div class="header-actions">
    <span class="status-dot" id="statusDot" title="Disconnected"></span>
    <button class="btn btn-ghost" onclick="openSettings()">Settings</button>
  </div>
</div>

<div class="tabs">
  <button class="tab active" data-tab="braindumps">BrainDumps</button>
  <button class="tab" data-tab="projects">Projects</button>
  <button class="tab" data-tab="tasks">Tasks</button>
</div>

<!-- BrainDumps Tab -->
<div class="content tab-content" id="tab-braindumps">
  <div class="toolbar">
    <input type="text" id="bdSearch" placeholder="Search braindumps..." oninput="filterBraindumps()">
    <select id="bdCategory" onchange="filterBraindumps()">
      <option value="">All Categories</option>
    </select>
    <button class="btn btn-primary" onclick="refreshBraindumps()">Refresh</button>
  </div>
  <div id="bdTable"></div>
</div>

<!-- Projects Tab -->
<div class="content tab-content hidden" id="tab-projects">
  <div class="toolbar">
    <button class="btn btn-primary" onclick="refreshProjects()">Refresh</button>
  </div>
  <div class="card-grid" id="projectCards"></div>
</div>

<!-- Tasks Tab -->
<div class="content tab-content hidden" id="tab-tasks">
  <div class="toolbar">
    <button class="btn btn-primary" onclick="openNewTask()">+ New Task</button>
    <button class="btn btn-ghost" onclick="refreshTasks()">Refresh</button>
  </div>
  <div id="taskList"></div>
</div>

<!-- Settings Modal -->
<div class="modal-overlay hidden" id="settingsModal">
  <div class="modal">
    <h2>Settings</h2>
    <label>Core Server URL</label>
    <input type="text" id="settingUrl" placeholder="http://127.0.0.1:7777">
    <label>Bearer Token</label>
    <input type="password" id="settingToken" placeholder="Enter your API token">
    <div class="actions">
      <button class="btn btn-ghost" onclick="closeSettings()">Cancel</button>
      <button class="btn btn-primary" onclick="saveSettings()">Save</button>
    </div>
  </div>
</div>

<!-- New Task Modal -->
<div class="modal-overlay hidden" id="newTaskModal">
  <div class="modal">
    <h2>New Task</h2>
    <label>Title</label>
    <input type="text" id="newTaskTitle" placeholder="Task title">
    <label>Project ID (optional)</label>
    <input type="number" id="newTaskProject" placeholder="Project ID">
    <label>Priority</label>
    <select id="newTaskPriority">
      <option value="low">Low</option>
      <option value="medium" selected>Medium</option>
      <option value="high">High</option>
    </select>
    <div class="actions">
      <button class="btn btn-ghost" onclick="closeNewTask()">Cancel</button>
      <button class="btn btn-primary" onclick="createTask()">Create</button>
    </div>
  </div>
</div>

<script>
// --- State ---
let coreUrl = localStorage.getItem('nexus_url') || 'http://127.0.0.1:7777';
let token = localStorage.getItem('nexus_token') || '';
let braindumps = [];
let projects = [];
let tasks = [];

// --- API ---
async function api(path, opts = {}) {
  const headers = { 'Content-Type': 'application/json' };
  if (token) headers['Authorization'] = 'Bearer ' + token;
  const res = await fetch(coreUrl + path, { ...opts, headers });
  if (!res.ok) throw new Error(`${res.status} ${res.statusText}`);
  return res.json();
}

async function checkConnection() {
  try {
    await api('/health');
    document.getElementById('statusDot').classList.add('connected');
    document.getElementById('statusDot').title = 'Connected to ' + coreUrl;
  } catch {
    document.getElementById('statusDot').classList.remove('connected');
    document.getElementById('statusDot').title = 'Disconnected';
  }
}

// --- Tabs ---
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
    tab.classList.add('active');
    document.getElementById('tab-' + tab.dataset.tab).classList.remove('hidden');
    // Refresh data on tab switch
    const name = tab.dataset.tab;
    if (name === 'braindumps') refreshBraindumps();
    else if (name === 'projects') refreshProjects();
    else if (name === 'tasks') refreshTasks();
  });
});

// --- BrainDumps ---
async function refreshBraindumps() {
  try {
    braindumps = await api('/braindump');
    // If the API returns an object with a data/items field, adapt:
    if (!Array.isArray(braindumps)) braindumps = braindumps.data || braindumps.items || [];
    populateCategoryFilter();
    renderBraindumps(braindumps);
  } catch (e) {
    document.getElementById('bdTable').innerHTML =
      '<div class="empty-state"><p>Could not load braindumps: ' + e.message + '</p></div>';
  }
}

function populateCategoryFilter() {
  const cats = [...new Set(braindumps.map(b => b.category).filter(Boolean))];
  const sel = document.getElementById('bdCategory');
  const cur = sel.value;
  sel.innerHTML = '<option value="">All Categories</option>' +
    cats.map(c => `<option value="${c}">${c}</option>`).join('');
  sel.value = cur;
}

function filterBraindumps() {
  const q = document.getElementById('bdSearch').value.toLowerCase();
  const cat = document.getElementById('bdCategory').value;
  const filtered = braindumps.filter(b => {
    if (cat && b.category !== cat) return false;
    if (q && !(b.raw_text || '').toLowerCase().includes(q) && !(b.category || '').toLowerCase().includes(q)) return false;
    return true;
  });
  renderBraindumps(filtered);
}

function renderBraindumps(items) {
  if (!items.length) {
    document.getElementById('bdTable').innerHTML = '<div class="empty-state"><p>No braindumps found.</p></div>';
    return;
  }
  const rows = items.map(b => `<tr>
    <td>${b.id || ''}</td>
    <td>${b.category ? '<span class="badge badge-category">' + esc(b.category) + '</span>' : '-'}</td>
    <td>${esc((b.raw_text || '').substring(0, 120))}${(b.raw_text || '').length > 120 ? '...' : ''}</td>
    <td>${b.created_at ? new Date(b.created_at).toLocaleDateString() : '-'}</td>
  </tr>`).join('');
  document.getElementById('bdTable').innerHTML = `<table>
    <thead><tr><th>ID</th><th>Category</th><th>Content</th><th>Date</th></tr></thead>
    <tbody>${rows}</tbody></table>`;
}

// --- Projects ---
async function refreshProjects() {
  try {
    projects = await api('/projects');
    if (!Array.isArray(projects)) projects = projects.data || projects.items || [];
    renderProjects();
  } catch (e) {
    document.getElementById('projectCards').innerHTML =
      '<div class="empty-state"><p>Could not load projects: ' + e.message + '</p></div>';
  }
}

async function renderProjects() {
  if (!projects.length) {
    document.getElementById('projectCards').innerHTML = '<div class="empty-state"><p>No projects found.</p></div>';
    return;
  }
  // Fetch progress for each project
  const cards = await Promise.all(projects.map(async p => {
    let pct = 0;
    try {
      const prog = await api(`/projects/${p.id}/progress`);
      pct = prog.percent || prog.progress || 0;
    } catch {}
    return `<div class="card">
      <h3>${esc(p.name || p.title || 'Untitled')}</h3>
      <p>${esc(p.description || '')}</p>
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
      <span style="font-size:12px;color:var(--text-dim);margin-top:4px;display:block">${Math.round(pct)}% complete</span>
    </div>`;
  }));
  document.getElementById('projectCards').innerHTML = cards.join('');
}

// --- Tasks ---
async function refreshTasks() {
  try {
    tasks = await api('/tasks');
    if (!Array.isArray(tasks)) tasks = tasks.data || tasks.items || [];
    renderTasks();
  } catch (e) {
    document.getElementById('taskList').innerHTML =
      '<div class="empty-state"><p>Could not load tasks: ' + e.message + '</p></div>';
  }
}

function renderTasks() {
  if (!tasks.length) {
    document.getElementById('taskList').innerHTML = '<div class="empty-state"><p>No tasks yet.</p></div>';
    return;
  }
  document.getElementById('taskList').innerHTML = tasks.map(t => {
    const done = t.status === 'done' || t.status === 'completed';
    return `<div class="task-item">
      <div class="checkbox ${done ? 'done' : ''}" onclick="toggleTask(${t.id}, ${done})"></div>
      <span class="task-title ${done ? 'done' : ''}">${esc(t.title || t.name || '')}</span>
      <span class="task-meta">${t.priority ? t.priority : ''}</span>
      <button class="btn btn-sm btn-danger" onclick="deleteTask(${t.id})">Delete</button>
    </div>`;
  }).join('');
}

async function toggleTask(id, currentlyDone) {
  try {
    await api(`/tasks/${id}`, {
      method: 'PUT',
      body: JSON.stringify({ status: currentlyDone ? 'todo' : 'done' })
    });
    refreshTasks();
  } catch (e) { alert('Error: ' + e.message); }
}

async function deleteTask(id) {
  if (!confirm('Delete this task?')) return;
  try {
    await api(`/tasks/${id}`, { method: 'DELETE' });
    refreshTasks();
  } catch (e) { alert('Error: ' + e.message); }
}

function openNewTask() { document.getElementById('newTaskModal').classList.remove('hidden'); }
function closeNewTask() { document.getElementById('newTaskModal').classList.add('hidden'); }

async function createTask() {
  const title = document.getElementById('newTaskTitle').value.trim();
  if (!title) return alert('Title is required');
  const body = { title, priority: document.getElementById('newTaskPriority').value };
  const projId = document.getElementById('newTaskProject').value;
  if (projId) body.project_id = parseInt(projId);
  try {
    await api('/tasks', { method: 'POST', body: JSON.stringify(body) });
    closeNewTask();
    document.getElementById('newTaskTitle').value = '';
    refreshTasks();
  } catch (e) { alert('Error: ' + e.message); }
}

// --- Settings ---
function openSettings() {
  document.getElementById('settingUrl').value = coreUrl;
  document.getElementById('settingToken').value = token;
  document.getElementById('settingsModal').classList.remove('hidden');
}
function closeSettings() { document.getElementById('settingsModal').classList.add('hidden'); }
function saveSettings() {
  coreUrl = document.getElementById('settingUrl').value.trim() || 'http://127.0.0.1:7777';
  token = document.getElementById('settingToken').value.trim();
  localStorage.setItem('nexus_url', coreUrl);
  localStorage.setItem('nexus_token', token);
  closeSettings();
  checkConnection();
}

// --- Util ---
function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

// --- Init ---
checkConnection();
refreshBraindumps();
</script>
</body>
</html>
